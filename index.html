<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>실시간 AI 동시통역기 (오디오 반응형)</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #f0f4f8; padding: 20px; display: flex; justify-content: center; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 600px; }
        h2 { text-align: center; color: #1e293b; margin-top: 0; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 14px; font-weight: bold; margin-bottom: 5px; color: #475569; }
        input, select { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; }
        .row { display: flex; gap: 10px; }
        .row .input-group { flex: 1; }
        button { width: 100%; padding: 15px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; color: white; background-color: #3b82f6; cursor: pointer; transition: 0.3s; margin-bottom: 15px; }
        button.recording { background-color: #ef4444; }
        
        /* 🎙️ 실시간 오디오 비주얼라이저 */
        .visualizer-container { display: flex; gap: 5px; justify-content: center; align-items: center; height: 60px; margin-bottom: 15px; background: #f8fafc; border-radius: 8px; border: 1px dashed #cbd5e1; }
        .bar { width: 8px; height: 4px; background-color: #3b82f6; border-radius: 4px; transition: height 0.05s ease; }

        .live-text { padding: 15px; background: #e0f2fe; border-radius: 8px; color: #0369a1; font-weight: bold; min-height: 24px; margin-bottom: 15px; text-align: center; }
        
        /* 📜 번역 기록 섹션 강조 */
        .history-label { display: block; margin-top: 20px; padding-bottom: 5px; border-bottom: 2px solid #3b82f6; color: #3b82f6; font-weight: bold; }
        .history { max-height: 300px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; margin-top: 10px; }
        .chat-bubble { padding: 12px; border-radius: 8px; background: #ffffff; border: 1px solid #e2e8f0; font-size: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .chat-bubble .original { color: #64748b; font-size: 13px; margin-bottom: 4px; border-bottom: 1px solid #f1f5f9; padding-bottom: 4px; }
        .chat-bubble .translated { color: #0f172a; font-weight: bold; margin-top: 4px; }
    </style>
</head>
<body>

<div class="container">
    <h2>⚡ 실시간 동시통역기</h2>

    <div class="input-group">
        <label>OpenAI API Key</label>
        <input type="password" id="apiKey" placeholder="sk-...">
    </div>

    <div class="row">
        <div class="input-group">
            <label>내 언어</label>
            <select id="inputLang">
                <option value="ko-KR">한국어</option>
                <option value="en-US">영어</option>
                <option value="ja-JP">일본어</option>
            </select>
        </div>
        <div class="input-group">
            <label>번역할 언어</label>
            <select id="outputLang">
                <option value="English">영어</option>
                <option value="Japanese">일본어</option>
                <option value="Korean">한국어</option>
            </select>
        </div>
    </div>

    <button id="toggleBtn">🎙️ 통역 시작하기</button>

    <div class="visualizer-container" id="visualizer">
        <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
        <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
    </div>

    <div class="live-text" id="liveText">버튼을 눌러 대화를 시작하세요.</div>

    <label class="history-label">📜 번역 기록</label>
    <div class="history" id="history"></div>
</div>

<script>
    const toggleBtn = document.getElementById('toggleBtn');
    const liveText = document.getElementById('liveText');
    const historyBox = document.getElementById('history');
    const bars = document.querySelectorAll('.bar');
    
    let isRecording = false;
    let recognition;
    let audioContext, analyser, dataArray, source, animationId;

    // --- 1. 오디오 분석 설정 (목소리 크기 감지) ---
    async function startVisualizer() {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioContext.createAnalyser();
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        source = audioContext.createMediaStreamSource(stream);
        source.connect(analyser);
        
        analyser.fftSize = 32; // 작을수록 막대 개수에 적합
        dataArray = new Uint8Array(analyser.frequencyBinCount);

        function draw() {
            animationId = requestAnimationFrame(draw);
            analyser.getByteFrequencyData(dataArray);
            
            bars.forEach((bar, index) => {
                const val = dataArray[index % dataArray.length];
                const height = Math.max(4, (val / 255) * 50); // 볼륨에 따라 높이 조절
                bar.style.height = `${height}px`;
                bar.style.backgroundColor = `rgb(59, 130, ${150 + val})`; // 크기에 따라 색상 변화
            });
        }
        draw();
    }

    function stopVisualizer() {
        if (animationId) cancelAnimationFrame(animationId);
        if (audioContext) audioContext.close();
        bars.forEach(bar => bar.style.height = '4px');
    }

    // --- 2. 음성 인식 설정 ---
    if (!('webkitSpeechRecognition' in window)) {
        alert("Chrome 브라우저를 사용해 주세요.");
    } else {
        recognition = new webkitSpeechRecognition();
        recognition.continuous = true;
        recognition.interimResults = true;

        recognition.onstart = () => {
            isRecording = true;
            toggleBtn.textContent = '⏹️ 통역 중지하기';
            toggleBtn.classList.add('recording');
            startVisualizer(); // 시각화 시작
        };

        recognition.onresult = (event) => {
            let interimTranscript = '';
            let finalTranscript = '';
            for (let i = event.resultIndex; i < event.results.length; ++i) {
                if (event.results[i].isFinal) finalTranscript += event.results[i][0].transcript;
                else interimTranscript += event.results[i][0].transcript;
            }
            if (interimTranscript) liveText.textContent = interimTranscript;
            if (finalTranscript) {
                liveText.textContent = finalTranscript;
                translateText(finalTranscript);
            }
        };

        recognition.onend = () => { if (isRecording) recognition.start(); };
    }

    toggleBtn.addEventListener('click', () => {
        const apiKey = document.getElementById('apiKey').value.trim();
        if (!apiKey && !isRecording) { alert('OpenAI API 키를 입력해주세요!'); return; }

        if (isRecording) {
            isRecording = false;
            recognition.stop();
            stopVisualizer(); // 시각화 중지
            toggleBtn.textContent = '🎙️ 통역 시작하기';
            toggleBtn.classList.remove('recording');
        } else {
            recognition.lang = document.getElementById('inputLang').value;
            recognition.start();
        }
    });

    // --- 3. 번역 및 기록 표시 ---
    async function translateText(text) {
        const apiKey = document.getElementById('apiKey').value.trim();
        const outputLang = document.getElementById('outputLang').value;

        const bubble = document.createElement('div');
        bubble.className = 'chat-bubble';
        bubble.innerHTML = `<div class="original">🎤 ${text}</div><div class="translated">⏳ 번역 중...</div>`;
        historyBox.prepend(bubble);

        try {
            const response = await fetch('https://api.openai.com/v1/chat/completions', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
                body: JSON.stringify({
                    model: 'gpt-3.5-turbo',
                    messages: [
                        { role: 'system', content: `Translate to ${outputLang}. Output only translation.` },
                        { role: 'user', content: text }
                    ]
                })
            });
            const data = await response.json();
            bubble.querySelector('.translated').textContent = "🌐 " + data.choices[0].message.content;
        } catch (error) {
            bubble.querySelector('.translated').textContent = '❌ 번역 실패';
        }
    }
</script>

</body>
</html>
