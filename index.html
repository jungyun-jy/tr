<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>실시간 AI 동시통역기</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #f0f4f8; padding: 20px; display: flex; justify-content: center; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 600px; }
        h2 { text-align: center; color: #1e293b; margin-top: 0; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 14px; font-weight: bold; margin-bottom: 5px; color: #475569; }
        input, select { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; }
        .row { display: flex; gap: 10px; }
        .row .input-group { flex: 1; }
        button { width: 100%; padding: 15px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; color: white; background-color: #3b82f6; cursor: pointer; transition: 0.3s; margin-bottom: 15px; }
        button.recording { background-color: #ef4444; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(0.98); } 100% { transform: scale(1); } }
        
        /* 🌊 음성 파동 시각화 CSS 추가 */
        .visualizer { display: flex; gap: 4px; justify-content: center; align-items: center; height: 30px; margin-bottom: 15px; opacity: 0; transition: opacity 0.3s; }
        .visualizer.active { opacity: 1; }
        .bar { width: 6px; height: 5px; background-color: #3b82f6; border-radius: 3px; }
        .visualizer.active .bar { animation: wave 1s infinite ease-in-out; }
        /* 각 막대기마다 애니메이션 딜레이를 줘서 물결처럼 보이게 함 */
        .visualizer.active .bar:nth-child(1) { animation-delay: 0.0s; }
        .visualizer.active .bar:nth-child(2) { animation-delay: 0.1s; height: 10px; }
        .visualizer.active .bar:nth-child(3) { animation-delay: 0.2s; height: 15px; }
        .visualizer.active .bar:nth-child(4) { animation-delay: 0.1s; height: 10px; }
        .visualizer.active .bar:nth-child(5) { animation-delay: 0.0s; }
        @keyframes wave { 0%, 100% { transform: scaleY(1); } 50% { transform: scaleY(2.5); background-color: #60a5fa; } }

        .live-text { padding: 15px; background: #e0f2fe; border-radius: 8px; color: #0369a1; font-weight: bold; min-height: 24px; margin-bottom: 15px; text-align: center; }
        .history { max-height: 300px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .chat-bubble { padding: 12px; border-radius: 8px; background: #f8fafc; border: 1px solid #e2e8f0; font-size: 15px; }
        .chat-bubble .original { color: #64748b; font-size: 13px; margin-bottom: 4px; }
        .chat-bubble .translated { color: #0f172a; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>⚡ 실시간 동시통역기</h2>

    <div class="input-group">
        <label>OpenAI API Key (번역용)</label>
        <input type="password" id="apiKey" placeholder="sk-...">
    </div>

    <div class="row">
        <div class="input-group">
            <label>내 언어 (음성 인식)</label>
            <select id="inputLang">
                <option value="ko-KR">한국어</option>
                <option value="en-US">영어</option>
                <option value="ja-JP">일본어</option>
            </select>
        </div>
        <div class="input-group">
            <label>번역할 언어</label>
            <select id="outputLang">
                <option value="English">영어</option>
                <option value="Japanese">일본어</option>
                <option value="Korean">한국어</option>
            </select>
        </div>
    </div>

    <button id="toggleBtn">🎙️ 통역 시작하기</button>

    <div class="visualizer" id="visualizer">
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
    </div>

    <div class="live-text" id="liveText">버튼을 누르고 말씀해 보세요.</div>

    <label>번역 기록</label>
    <div class="history" id="history"></div>
</div>

<script>
    const toggleBtn = document.getElementById('toggleBtn');
    const liveText = document.getElementById('liveText');
    const historyBox = document.getElementById('history');
    const visualizer = document.getElementById('visualizer'); // 파동 요소 가져오기
    
    let isRecording = false;
    let recognition;

    if (!('webkitSpeechRecognition' in window)) {
        alert("이 브라우저는 실시간 음성 인식을 지원하지 않습니다. Chrome 브라우저를 사용해 주세요.");
    } else {
        recognition = new webkitSpeechRecognition();
        recognition.continuous = true; 
        recognition.interimResults = true; 

        recognition.onstart = () => {
            isRecording = true;
            toggleBtn.textContent = '⏹️ 통역 중지하기';
            toggleBtn.classList.add('recording');
            visualizer.classList.add('active'); // 🌊 마이크 켜지면 파동 시작
            liveText.textContent = '듣고 있습니다...';
        };

        recognition.onresult = (event) => {
            let interimTranscript = '';
            let finalTranscript = '';

            for (let i = event.resultIndex; i < event.results.length; ++i) {
                if (event.results[i].isFinal) {
                    finalTranscript += event.results[i][0].transcript;
                } else {
                    interimTranscript += event.results[i][0].transcript;
                }
            }

            if (interimTranscript) {
                liveText.textContent = interimTranscript;
            }

            if (finalTranscript) {
                liveText.textContent = finalTranscript;
                translateText(finalTranscript);
            }
        };

        recognition.onerror = (event) => {
            console.error(event.error);
            if (event.error !== 'no-speech') {
                alert("음성 인식 오류: " + event.error);
            }
        };

        recognition.onend = () => {
            if (isRecording) recognition.start();
        };
    }

    toggleBtn.addEventListener('click', () => {
        const apiKey = document.getElementById('apiKey').value.trim();
        if (!apiKey && !isRecording) {
            alert('번역을 위해 OpenAI API 키를 입력해주세요!');
            return;
        }

        if (isRecording) {
            isRecording = false;
            recognition.stop();
            toggleBtn.textContent = '🎙️ 통역 시작하기';
            toggleBtn.classList.remove('recording');
            visualizer.classList.remove('active'); // 🌊 마이크 꺼지면 파동 숨김
            liveText.textContent = '통역이 중지되었습니다.';
        } else {
            recognition.lang = document.getElementById('inputLang').value;
            recognition.start();
        }
    });

    async function translateText(text) {
        const apiKey = document.getElementById('apiKey').value.trim();
        const outputLang = document.getElementById('outputLang').value;

        const bubble = document.createElement('div');
        bubble.className = 'chat-bubble';
        bubble.innerHTML = `<div class="original">${text}</div><div class="translated">⏳ 번역 중...</div>`;
        historyBox.prepend(bubble); 

        try {
            const response = await fetch('https://api.openai.com/v1/chat/completions', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
                body: JSON.stringify({
                    model: 'gpt-3.5-turbo',
                    messages: [
                        { role: 'system', content: `You are a fast translator. Translate the text to ${outputLang}. ONLY output the translation.` },
                        { role: 'user', content: text }
                    ]
                })
            });

            if (!response.ok) throw new Error('API 오류');
            const data = await response.json();
            const translatedText = data.choices[0].message.content;

            bubble.querySelector('.translated').textContent = translatedText;
        } catch (error) {
            bubble.querySelector('.translated').textContent = '❌ 번역 실패 (API 키를 확인하세요)';
        }
    }
</script>

</body>
</html>
