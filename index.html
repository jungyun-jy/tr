<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 음성 번역기 (Whisper)</title>
    <style>
        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #f7f9fc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 500px;
        }
        h2 { color: #333; text-align: center; margin-bottom: 25px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 14px; font-weight: bold; margin-bottom: 5px; color: #555; }
        input[type="password"], select {
            width: 100%; padding: 10px; border: 1px solid #ddd;
            border-radius: 6px; box-sizing: border-box; font-size: 14px;
        }
        .row { display: flex; gap: 10px; }
        .row .input-group { flex: 1; }
        .btn-record {
            width: 100%; padding: 15px; border: none; border-radius: 8px;
            font-size: 16px; font-weight: bold; color: white;
            background-color: #ef4444; cursor: pointer; transition: 0.3s;
            margin-top: 10px;
        }
        .btn-record.recording { background-color: #b91c1c; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(0.98); } 100% { transform: scale(1); } }
        .result-box {
            margin-top: 20px; padding: 15px; background-color: #f8fafc;
            border: 1px solid #e2e8f0; border-radius: 6px; min-height: 80px;
            font-size: 15px; line-height: 1.5; color: #333;
        }
        .status { text-align: center; font-size: 13px; color: #666; margin-top: 10px; min-height: 20px;}
    </style>
</head>
<body>

<div class="container">
    <h2>🎙️ AI 음성 번역기</h2>

    <div class="input-group">
        <label for="apiKey">OpenAI API Key (저장되지 않습니다)</label>
        <input type="password" id="apiKey" placeholder="sk-...">
    </div>

    <div class="row">
        <div class="input-group">
            <label for="inputLang">말하는 언어 (입력)</label>
            <select id="inputLang">
                <option value="ko">한국어</option>
                <option value="en">영어</option>
                <option value="ja">일본어</option>
                <option value="zh">중국어</option>
            </select>
        </div>
        <div class="input-group">
            <label for="outputLang">번역할 언어 (출력)</label>
            <select id="outputLang">
                <option value="English">영어</option>
                <option value="Japanese">일본어</option>
                <option value="Korean">한국어</option>
                <option value="Chinese">중국어</option>
                <option value="Spanish">스페인어</option>
            </select>
        </div>
    </div>

    <button id="recordBtn" class="btn-record">🔴 녹음 시작</button>
    <div id="status" class="status">버튼을 눌러 녹음을 시작하세요.</div>

    <div class="input-group" style="margin-top: 20px;">
        <label>번역 결과:</label>
        <div id="resultBox" class="result-box">결과가 여기에 표시됩니다.</div>
    </div>
</div>

<script>
    let mediaRecorder;
    let audioChunks = [];
    let isRecording = false;

    const recordBtn = document.getElementById('recordBtn');
    const statusText = document.getElementById('status');
    const resultBox = document.getElementById('resultBox');

    recordBtn.addEventListener('click', async () => {
        const apiKey = document.getElementById('apiKey').value.trim();
        if (!apiKey) {
            alert('OpenAI API 키를 입력해주세요!');
            return;
        }

        if (!isRecording) {
            // 녹음 시작
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];

                mediaRecorder.ondataavailable = event => {
                    audioChunks.push(event.data);
                };

                mediaRecorder.onstop = processAudio;

                mediaRecorder.start();
                isRecording = true;
                recordBtn.textContent = '⏹️ 녹음 중지 및 번역하기';
                recordBtn.classList.add('recording');
                statusText.textContent = '마이크로 말씀해 주세요...';
                resultBox.innerHTML = '';
            } catch (err) {
                alert('마이크 접근 권한이 필요합니다!');
            }
        } else {
            // 녹음 중지
            mediaRecorder.stop();
            isRecording = false;
            recordBtn.textContent = '🔴 녹음 시작';
            recordBtn.classList.remove('recording');
        }
    });

    async function processAudio() {
        const apiKey = document.getElementById('apiKey').value.trim();
        const inputLang = document.getElementById('inputLang').value;
        const outputLang = document.getElementById('outputLang').value;
        
        statusText.textContent = '⏳ 오디오 변환 중 (Whisper)...';
        
        // 1. 오디오 파일을 Blob 형태로 만들기
        const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
        const formData = new FormData();
        formData.append('file', new File([audioBlob], 'audio.webm'));
        formData.append('model', 'whisper-1');
        formData.append('language', inputLang); // 입력 언어 설정

        try {
            // 2. Whisper API 호출 (음성 -> 텍스트)
            const whisperResponse = await fetch('https://api.openai.com/v1/audio/transcriptions', {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${apiKey}` },
                body: formData
            });

            if (!whisperResponse.ok) throw new Error('Whisper API 호출 실패. API 키를 확인하세요.');
            
            const whisperData = await whisperResponse.json();
            const transcribedText = whisperData.text;

            statusText.textContent = '⏳ 텍스트 번역 중 (GPT)...';
            resultBox.innerHTML = `<strong>원문:</strong> ${transcribedText}<br><br>`;

            // 3. GPT API 호출 (원문 -> 원하는 언어로 번역)
            const gptResponse = await fetch('https://api.openai.com/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${apiKey}`
                },
                body: JSON.stringify({
                    model: 'gpt-3.5-turbo',
                    messages: [
                        { role: 'system', content: `You are a helpful translator. Translate the given text to ${outputLang}. Provide ONLY the translated text, nothing else.` },
                        { role: 'user', content: transcribedText }
                    ]
                })
            });

            if (!gptResponse.ok) throw new Error('번역 API 호출 실패.');

            const gptData = await gptResponse.json();
            const translatedText = gptData.choices[0].message.content;

            statusText.textContent = '✅ 번역 완료!';
            resultBox.innerHTML += `<strong>번역 (${outputLang}):</strong><br>${translatedText}`;

        } catch (error) {
            console.error(error);
            statusText.textContent = '❌ 에러 발생: ' + error.message;
        }
    }
</script>

</body>
</html>
